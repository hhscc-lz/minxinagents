<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民心智能体 · 管理后台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  background: #1a3a6b;
  color: #fff;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
.stats-bar { display: flex; gap: 24px; }
.stat { display: flex; flex-direction: column; align-items: center; }
.stat-value { font-size: 22px; font-weight: 700; line-height: 1; color: #7ecef4; }
.stat-label { font-size: 11px; color: #aac4e0; margin-top: 2px; }

/* Main layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Thread list */
.list-pane {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  transition: flex 0.3s ease;
}
.list-pane.shrink { flex: 0 0 420px; }

.list-header {
  display: grid;
  grid-template-columns: 150px 100px 60px 1fr;
  gap: 8px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid #dde3ec;
  margin-bottom: 4px;
}

.thread-row {
  display: grid;
  grid-template-columns: 150px 100px 60px 1fr;
  gap: 8px;
  padding: 10px 12px;
  background: #fff;
  border-radius: 6px;
  margin-bottom: 4px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.thread-row:hover { border-color: #4a90d9; box-shadow: 0 2px 8px rgba(74,144,217,0.15); }
.thread-row.active { border-color: #1a3a6b; background: #eaf2ff; }

.cell { font-size: 13px; line-height: 1.4; }
.cell-time { color: #555; }
.cell-time small { display: block; font-size: 11px; color: #999; }
.cell-ago { color: #777; font-size: 12px; }
.cell-count { text-align: center; font-weight: 600; color: #1a3a6b; }
.cell-prompt { color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.empty-state {
  text-align: center;
  padding: 60px 0;
  color: #999;
  font-size: 14px;
}

/* Detail pane */
.detail-pane {
  width: 0;
  overflow: hidden;
  transition: width 0.3s ease;
  background: #fff;
  border-left: 1px solid #dde3ec;
  display: flex;
  flex-direction: column;
}
.detail-pane.open { width: 65%; min-width: 600px; max-width: 900px; }

.detail-header {
  padding: 14px 16px;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: #f7f9fc;
}
.detail-header h3 { font-size: 14px; color: #444; }
.close-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: #999;
  line-height: 1;
  padding: 0 4px;
}
.close-btn:hover { color: #333; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}
.bubble.user {
  align-self: flex-end;
  background: #1a3a6b;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble.ai {
  align-self: flex-start;
  background: #f0f4fa;
  color: #222;
  border-bottom-left-radius: 4px;
}
.bubble.ai strong { font-weight: 700; }
.bubble.ai em { font-style: italic; }

details.tool-block {
  align-self: flex-start;
  width: 95%;
  border: 1.5px solid #d4af37;
  border-radius: 8px;
  font-size: 12px;
  background: #fffef8;
  margin: 4px 0;
}
details.tool-block summary {
  padding: 9px 14px;
  background: linear-gradient(135deg, #fff9e6 0%, #fef5d4 100%);
  cursor: pointer;
  color: #8b6914;
  font-weight: 600;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #e8d9a8;
}
details.tool-block summary::before {
  content: "🔧";
  font-size: 14px;
  filter: grayscale(0.3);
}
details.tool-block[open] summary { background: #fff9e6; }
details.tool-block summary .tool-name {
  font-family: 'Courier New', monospace;
  background: rgba(139, 105, 20, 0.1);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 11px;
}
details.tool-block pre {
  margin: 0;
  padding: 12px 14px;
  background: #fafaf5;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 11px;
  font-family: 'SF Mono', 'Consolas', monospace;
  color: #444;
  max-height: 80vh;
  overflow-y: auto;
  border-top: 1px solid #f0ead0;
}

.loading-msg { color: #999; font-size: 13px; text-align: center; padding: 40px 0; }

/* Pagination */
.pagination {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 12px 0 4px;
}
.pagination button {
  padding: 5px 14px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: #fff;
  cursor: pointer;
  font-size: 13px;
}
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination button:not(:disabled):hover { background: #eaf2ff; border-color: #4a90d9; }
</style>
</head>
<body>

<div class="header">
  <h1>民心智能体 · 管理后台</h1>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="stat-total">—</span>
      <span class="stat-label">总会话</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="stat-today">—</span>
      <span class="stat-label">今日新增</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="list-pane" id="listPane">
    <div class="list-header">
      <span>创建时间</span>
      <span>最后活跃</span>
      <span style="text-align:center">消息</span>
      <span>第一句话</span>
    </div>
    <div id="threadList"><div class="loading-msg">加载中…</div></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="detail-pane" id="detailPane">
    <div class="detail-header">
      <h3 id="detailTitle">对话详情</h3>
      <button class="close-btn" onclick="closePanel()">×</button>
    </div>
    <div class="messages" id="messages">
      <div class="loading-msg">选择一条会话查看详情</div>
    </div>
  </div>
</div>

<script>
let currentOffset = 0;
const PAGE_SIZE = 50;
let totalThreads = 0;
let activeRow = null;

async function loadThreads(offset = 0) {
  currentOffset = offset;
  const res = await fetch(`/admin/api/threads?limit=${PAGE_SIZE}&offset=${offset}`);
  const data = await res.json();

  document.getElementById('stat-total').textContent = data.total;
  document.getElementById('stat-today').textContent = data.today;
  totalThreads = data.total;

  renderList(data.threads);
  renderPagination();
}

function renderList(threads) {
  const el = document.getElementById('threadList');
  if (!threads.length) {
    el.innerHTML = '<div class="empty-state">暂无会话记录</div>';
    return;
  }
  el.innerHTML = threads.map(t => {
    const created = formatTime(t.created_at);
    const prompt = escHtml(t.initial_prompt || '（无内容）');
    return `
      <div class="thread-row" data-id="${t.thread_id}" onclick="openThread(this, '${t.thread_id}', ${t.message_count})">
        <div class="cell cell-time">
          ${created}
          <small>${t.created_at_relative || ''}</small>
        </div>
        <div class="cell cell-ago">${t.updated_at_relative || '—'}</div>
        <div class="cell cell-count">${t.message_count}</div>
        <div class="cell cell-prompt" title="${prompt}">${prompt}</div>
      </div>`;
  }).join('');
}

function renderPagination() {
  const el = document.getElementById('pagination');
  const hasPrev = currentOffset > 0;
  const hasNext = currentOffset + PAGE_SIZE < totalThreads;
  if (!hasPrev && !hasNext) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button onclick="loadThreads(${currentOffset - PAGE_SIZE})" ${hasPrev ? '' : 'disabled'}>上一页</button>
    <span style="font-size:12px;color:#999;align-self:center">
      ${currentOffset + 1}–${Math.min(currentOffset + PAGE_SIZE, totalThreads)} / ${totalThreads}
    </span>
    <button onclick="loadThreads(${currentOffset + PAGE_SIZE})" ${hasNext ? '' : 'disabled'}>下一页</button>`;
}

async function openThread(rowEl, threadId, msgCount) {
  if (activeRow) activeRow.classList.remove('active');
  rowEl.classList.add('active');
  activeRow = rowEl;

  document.getElementById('detailPane').classList.add('open');
  document.getElementById('listPane').classList.add('shrink');
  document.getElementById('detailTitle').textContent = `对话详情（${msgCount} 条消息）`;
  document.getElementById('messages').innerHTML = '<div class="loading-msg">加载中…</div>';

  const res = await fetch(`/admin/api/threads/${threadId}`);
  const data = await res.json();
  renderMessages(data.messages);
}

function closePanel() {
  document.getElementById('detailPane').classList.remove('open');
  document.getElementById('listPane').classList.remove('shrink');
  if (activeRow) { activeRow.classList.remove('active'); activeRow = null; }
}

function renderMessages(messages) {
  const el = document.getElementById('messages');
  if (!messages.length) {
    el.innerHTML = '<div class="loading-msg">无消息记录</div>';
    return;
  }
  el.innerHTML = messages.map(msg => renderMessage(msg)).join('');
  el.scrollTop = 0;
}

function renderMessage(msg) {
  if (msg.type === 'human') {
    return `<div class="bubble user">${escHtml(msg.content)}</div>`;
  }

  if (msg.type === 'ai') {
    let html = '';
    if (msg.content && msg.content.trim()) {
      html += `<div class="bubble ai">${renderMarkdown(msg.content)}</div>`;
    }
    if (msg.tool_calls && msg.tool_calls.length) {
      html += msg.tool_calls.map(tc => `
        <details class="tool-block">
          <summary>
            <span class="tool-name">${escHtml(tc.name || '未知工具')}</span>
            <span style="color:#999;font-size:10px;margin-left:auto">调用参数</span>
          </summary>
          <pre>${escHtml(JSON.stringify(tc.input, null, 2))}</pre>
        </details>`).join('');
    }
    return html || '';
  }

  if (msg.type === 'tool') {
    const outputPreview = (msg.content || '').slice(0, 80);
    const hasMore = (msg.content || '').length > 80;
    return `
      <details class="tool-block">
        <summary>
          <span class="tool-name">${escHtml(msg.tool_name || '未知工具')}</span>
          <span style="color:#999;font-size:10px;margin-left:auto">执行结果${hasMore ? ' (点击展开)' : ''}</span>
        </summary>
        <pre>${escHtml(msg.content || '(无输出)')}</pre>
      </details>`;
  }

  return '';
}

function renderMarkdown(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function formatTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleString('zh-CN', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch { return iso; }
}

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

loadThreads(0);
</script>
</body>
</html>
