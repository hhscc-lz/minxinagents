volumes:
  langgraph-data:
    driver: local
  deepagents-sessions:
    driver: local

services:
  langgraph-redis:
    image: redis:6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 1s
      retries: 5

  langgraph-postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - langgraph-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s

  minxinagent:
    image: ${IMAGE_NAME:-minxinagent:v0.0.1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8000"
    depends_on:
      langgraph-redis:
        condition: service_healthy
      langgraph-postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - deepagents-sessions:/root/.deepagents
    environment:
      REDIS_URI: redis://langgraph-redis:6379
      DATABASE_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable

  minxinagent-admin:
    image: ${ADMIN_IMAGE_NAME:-minxinagent-admin:v1.0.4}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8001}:8001"
    volumes:
      - deepagents-sessions:/root/.deepagents
    environment:
      PYTHONUNBUFFERED: "1"
